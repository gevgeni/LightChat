<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>LightChat Minimal Client</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #eef2f3;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 1000px;
            height: 850px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            overflow: hidden;
        }

        #authSection {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .auth-box {
            width: 380px;
        }

        #mainInterface {
            display: none;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 250px;
            background: #2f3e46;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
        }

        .sidebar-header {
            padding: 15px;
            background: #243036;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 18px 20px;
            border-bottom: 1px solid #3a4f59;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .chat-item:hover {
                background: #3a4f59;
            }

            .chat-item.active {
                background: #007fff;
            }

        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f7f9fa;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e1e4e6;
            font-weight: bold;
            font-size: 16px;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 70%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 18px;
            line-height: 1.3;
            word-wrap: break-word;
        }

            .msg.incoming {
                background: #e3e6e8;
                align-self: flex-start;
            }

            .msg.outgoing {
                background: #288ff7;
                color: white;
                align-self: flex-end;
            }

        .msg-sender {
            font-weight: bold;
            font-size: 11px;
            display: block;
            color: #555;
        }

        .msg-sentAt {
            font-weight: bold;
            font-size: 11px;
            text-align: right;
            display: block;
            color: #111;
        }

        .msg.outgoing .msg-sender {
            color: #e6f2ff;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e4e6;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background: #007fff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

            button:hover {
                background: #0066cc;
            }

        #noChatSelected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 16px;
        }

        .members-sidebar {
            width: 230px;
            background: #ffffff;
            border-left: 1px solid #e1e4e6;
            display: flex;
            flex-direction: column;
        }

        .members-header {
            padding: 15px;
            background: #f7f9fa;
            border-bottom: 1px solid #e1e4e6;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .member-item {
            padding: 10px;
            border-bottom: 1px solid #f0f2f3;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

            .member-status.online {
                background: #2ec4b6;
            }

            .member-status.offline {
                background: #95a5a6;
            }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="authSection">

            <div class="auth-box" id="loginBox">
                <h2 style="text-align: center; margin-bottom: 20px;">Войти в LightChat</h2>
                <div style="margin-bottom: 15px;">
                    <input type="text" id="usernameInput" placeholder="Введите ваш Username" style="width: 100%; box-sizing: border-box;" />
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="password" id="passwordInput" placeholder="Введите ваш Пароль" style="width: 100%; box-sizing: border-box;" onkeypress="if(event.key === 'Enter') loginAndLoadApp()" />
                </div>
                <button style="width: 100%;" onclick="loginAndLoadApp()">Войти</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="toggleAuthMode(true); return false;" style="color: #007fff; text-decoration: none; font-size: 14px; font-weight: bold;">Зарегистрироваться</a>
                </div>
            </div>

            <div class="auth-box" id="registerBox" style="display: none;">
                <h2 style="text-align: center; margin-bottom: 20px;">Регистрация в LightChat</h2>
                <div style="margin-bottom: 15px;">
                    <input type="text" id="regUsernameInput" placeholder="Придумайте Username" style="width: 100%; box-sizing: border-box;" />
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="email" id="regEmailInput" placeholder="Введите ваш Email" style="width: 100%; box-sizing: border-box;" />
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="password" id="regPasswordInput" placeholder="Придумайте Пароль" style="width: 100%; box-sizing: border-box;" />
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="password" id="regPasswordConfirmInput" placeholder="Повторите Пароль" style="width: 100%; box-sizing: border-box;" onkeypress="if(event.key === 'Enter') registerAccount()" />
                </div>
                <button style="width: 100%; background: #2ec4b6; margin-bottom: 15px;" onclick="registerAccount()">Зарегистрироваться</button>
                <div style="text-align: center;">
                    <a href="#" onclick="toggleAuthMode(false); return false;" style="color: #2ec4b6; text-decoration: none; font-size: 14px; font-weight: bold;">Уже есть аккаунт? Войти</a>
                </div>
            </div>

        </div>

        <div id="mainInterface">
            <div style="display: flex; width: 100%; height: 100%;">
                <div class="sidebar">
                    <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
                        <span>Мои чаты</span>
                        <div style="display: flex; gap: 5px;">
                            <button onclick="openDirectChatModal()" style="background: #007fff; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;" title="Написать лично">💬</button>
                            <button onclick="openCreateChatModal()" style="background: #2ec4b6; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;" title="Создать группу">+</button>
                        </div>
                    </div>
                    <div class="chats-list" id="chatsListContainer"></div>

                    <div style="padding: 15px; background: #243036; text-align: center;">
                        <button onclick="logout()" style="background: #e63946; width: 100%; padding: 8px;">Выйти из аккаунта</button>
                    </div>
                </div>

                <div class="chat-window">
                    <div id="noChatSelected">Выберите чат слева, чтобы начать общение</div>

                    <div id="activeChatArea" style="display: none; flex-direction: column; flex: 1; height: 100%;">
                        <div class="chat-header" id="currentChatTitle">Название чата</div>

                        <div style="display: flex; flex: 1; overflow: hidden;">
                            <div style="display: flex; flex-direction: column; flex: 1; height: 100%;">
                                <div class="messages-list" id="messagesList"></div>
                                <div id="typingIndicator" style="display: none; padding: 0 25px 10px 25px; font-size: 13px; color: #888; font-style: italic; background: #f7f9fa;"></div>
                                <div class="input-area">
                                    <input type="text" id="messageTextInput" placeholder="Напишите сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()" />
                                    <button onclick="sendMessage()">Отправить</button>
                                </div>
                            </div>

                            <div class="members-sidebar">
                                <div class="members-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
                                    <span>В чате (<span id="membersCount">0</span>)</span>
                                    <button onclick="openAddMemberModal()" style="background: #2ec4b6; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;">+</button>
                                </div>
                                <div class="members-list" id="chatMembersContainer"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="createChatModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 320px; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">Новый чат</h3>
                <button onclick="closeCreateChatModal()" style="background: none; border: none; font-size: 18px; cursor: pointer;">&times;</button>
            </div>
            <input type="text" id="newChatNameInput" placeholder="Введите название чата..." style="padding: 8px; border: 1px solid #e1e4e6; border-radius: 6px; font-size: 14px;" />
            <button onclick="submitCreateChat()" style="background: #2ec4b6; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold;">Создать</button>
        </div>
    </div>

    <div id="addMemberModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 320px; max-height: 400px; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">Добавить участника</h3>
                <button onclick="closeAddMemberModal()" style="background: none; border: none; font-size: 18px; cursor: pointer;">&times;</button>
            </div>
            <div id="addMemberUsersList" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 250px;">
            </div>
        </div>
    </div>

    <div id="directChatModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 320px; max-height: 400px; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">Начать личный чат</h3>
                <button onclick="closeDirectChatModal()" style="background: none; border: none; font-size: 18px; cursor: pointer;">&times;</button>
            </div>
            <div id="directChatUsersList" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 250px;">

            </div>
        </div>
    </div>

    <script>
        let connection = null;
        let jwtToken = "";
        let currentUserId = null;
        let activeChatId = null;

        let oldestMessageId = null;
        let isLoadingMessages = false;
        let hasMoreMessages = true;

        let isActiveChatDirect = false;

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        window.onload = async function () {
            const savedToken = localStorage.getItem("lightchat_token");
            if (savedToken) {
                const parsed = parseJwt(savedToken);
                if (parsed && parsed.exp) {
                    const currentTime = Math.floor(Date.now() / 1000);
                    if (parsed.exp > currentTime) {
                        jwtToken = savedToken;
                        currentUserId = parsed["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] || parsed["sub"] || parsed["nameid"];
                        await initializeApp();
                        return;
                    }
                }
                localStorage.removeItem("lightchat_token");
            }
        }

        async function loginAndLoadApp() {
            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value;

            if (!username || !password) {
                alert("Введите имя пользователя и пароль");
                return;
            }

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (!response.ok) throw new Error("Неверное имя пользователя или пароль");

                const data = await response.json();
                jwtToken = data.token;

                const parsed = parseJwt(jwtToken);

                localStorage.setItem("lightchat_token", jwtToken)
                currentUserId = parsed["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] || parsed["sub"] || parsed["nameid"];

                console.log("JWT получен успешно!");
                await initializeApp();
            } catch (err) {
                console.error("Ошибка:", err);
                alert("Ошибка: " + err.message);
            }
        }

        async function initializeApp() {
            try {
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("/chatHub", { accessTokenFactory: () => jwtToken })
                    .withAutomaticReconnect()
                    .build();

                connection.on("ReceiveMessage", (message) => {
                    if (message.chatId === activeChatId) {
                        appendSingleMessage(message, false);
                        scrollToBottom(false);

                        const isNotMyMessage = String(message.senderId).toLowerCase() !== String(currentUserId).toLowerCase();

                        if (isNotMyMessage) {
                            connection.invoke("MarkChatAsRead", message.chatId)
                                .catch(err => console.error("Ошибка авто-прочтения входящего сообщения:", err));
                        }
                    } else {
                        console.log(`Пришло сообщение в фоновый чат: ${message.chatId}`);

                        try {
                            playSystemNotificationSound();
                        } catch (soundError) {
                            console.error("[Audio Error] Ошибка внутри вызова звука:", soundError);
                        }

                        const chatItem = document.getElementById(`chat-item-${message.chatId}`);
                        if (chatItem) {
                            chatItem.style.fontWeight = "bold";

                            const badge = chatItem.querySelector('.unread-badge');
                            if (badge) {
                                let currentCount = parseInt(badge.innerText) || 0;
                                currentCount++;
                                badge.innerText = currentCount;
                                badge.style.display = 'inline-block';
                            }
                        }
                    }
                });

                connection.on("UserStatusChanged", (data) => {
                    console.log(`Статус пользователя ${data.userId} изменился: ${data.isOnline}`);

                    const memberRow = document.querySelector(`#chatMembersContainer [data-member-id="${data.userId}"]`);
                    if (memberRow) {
                        const statusIndicator = memberRow.querySelector('.member-status');
                        if (statusIndicator) {
                            if (data.isOnline) {
                                statusIndicator.classList.remove('offline');
                                statusIndicator.classList.add('online');
                            } else {
                                statusIndicator.classList.remove('online');
                                statusIndicator.classList.add('offline');
                            }
                        }
                    }
                });

                let hideTypingIndicatorTimer;
                connection.on("UserIsTyping", (data) => {
                    if (data.chatId !== activeChatId) return;

                    const indicator = document.getElementById("typingIndicator");

                    const memberElement = document.querySelector(`#chatMembersContainer [data-member-id="${data.userId}"] span`);
                    const username = memberElement ? memberElement.innerHTML.replace(" (Вы)", "") : "Собеседник";

                    indicator.innerText = `${username} печатает...`;
                    indicator.style.display = "block";

                    clearTimeout(hideTypingIndicatorTimer);
                    hideTypingIndicatorTimer = setTimeout(() => {
                        indicator.style.display = "none";
                    }, 2000);
                });

                connection.on("MessagesMarkedAsRead", (data) => {
                    const isCurrentChat = String(data.chatId) === String(activeChatId);
                    const isReaderMe = String(data.readerId).toLowerCase() === String(currentUserId).toLowerCase();

                    if (isCurrentChat && !isReaderMe) {
                        const myMessagesStatuses = document.querySelectorAll('#messagesList .outgoing .msg-status');
                        myMessagesStatuses.forEach(statusEl => {
                            if (statusEl.innerText.trim() === '✓') {
                                statusEl.innerText = '✓✓';
                            }
                        });
                    }

                    if (isReaderMe) {
                        const chatItem = document.getElementById(`chat-item-${data.chatId}`);
                        if (chatItem) {
                            chatItem.style.fontWeight = "normal";
                            const badge = chatItem.querySelector('.unread-badge');
                            if (badge) {
                                badge.innerText = "0";
                                badge.style.display = "none";
                            }
                        }
                    }

                    if (!isCurrentChat || isReaderMe) return;

                    const myMessagesStatuses = document.querySelectorAll('#messagesList .outgoing .msg-status');
                    myMessagesStatuses.forEach(statusEl => {
                        if (statusEl.innerText === '✓') {
                            statusEl.innerText = '✓✓';
                        }
                    });
                });

                connection.on("ChatInvitation", async (chat) => {
                    console.log("Вас пригласили в новый чат! Обновляем список...", chat);

                    await loadUserChats();
                });

                await connection.start();

                document.getElementById("authSection").style.display = "none";
                document.getElementById("mainInterface").style.display = "block";
                console.log("Успешное защищенное подключение к SignalR");

                await loadUserChats();
                document.getElementById("messagesList").addEventListener("scroll", handleScroll);
            } catch (err) {
                console.error("Ошибка:", err);
                alert("Ошибка: " + err.message);
            }
        }

        function logout() {
            localStorage.removeItem("lightchat_token");
            jwtToken = "";
            currentUserId = null;
            activeChatId = null;

            if (connection) { connection.stop(); }

            document.getElementById("mainInterface").style.display = "none";
            document.getElementById("authSection").style.display = "flex";
        }

        async function loadChatMembers(chatId) {
            try {
                const response = await fetch(`/chats/${chatId}/members`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить участников");

                const members = await response.json();
                const container = document.getElementById("chatMembersContainer");
                const countSpan = document.getElementById("membersCount");

                container.innerHTML = "";
                countSpan.innerText = members.length;

                members.forEach(member => {
                    const item = document.createElement("div");
                    item.classList.add("member-item");
                    item.setAttribute("data-member-id", member.id);

                    const isMe = member.id === currentUserId ? " (Вы)" : "";
                    const statusClass = (member.id === currentUserId || member.isOnline) ? "online" : "offline";

                    item.innerHTML = `<div class="member-status ${statusClass}"></div><span>${member.username}${isMe}</span>`;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("Ошибка загрузки участников:", err);
            }
        }

        async function loadUserChats() {
            try {
                const response = await fetch('/chats', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить список чатов");

                const chats = await response.json();
                const container = document.getElementById("chatsListContainer");
                container.innerHTML = "";

                chats.forEach(chat => {
                    const item = document.createElement("div");
                    item.classList.add("chat-item");
                    item.id = `chat-item-${chat.id}`;
                    item.innerText = chat.name;
                    item.dataset.isDirect = chat.isDirect;
                    item.onclick = () => selectChat(chat.id, chat.name);

                    const unreadCount = chat.unreadCount || 0;
                    const badgeDisplay = unreadCount > 0 ? 'inline-block' : 'none';

                    item.innerHTML = `
                        <span class="chat-item-name">${chat.name}</span>
                        <span class="unread-badge" style="display: ${badgeDisplay}; background: #2ec4b6; color: white; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; min-width: 14px; text-align: center;">${unreadCount}</span>
                    `;

                    container.appendChild(item);

                    if (connection && connection.state === signalR.HubConnectionState.Connected) {
                        connection.invoke("JoinChat", chat.id).catch(err =>
                            console.error(`Ошибка фонового подключения к чату ${chat.id}:`, err)
                        );
                    }
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function selectChat(chatId, chatName) {
            if (activeChatId === chatId) return;

            if (activeChatId) {
                document.getElementById(`chat-item-${activeChatId}`)?.classList.remove("active");
            }
            activeChatId = chatId;

            const currentChatItem = document.getElementById(`chat-item-${activeChatId}`);
            const isDirect = currentChatItem ? currentChatItem.dataset.isDirect === 'true' : false;
            isActiveChatDirect = isDirect;

            const addMemberBtn = document.querySelector(".members-header button");
            if (addMemberBtn) addMemberBtn.style.display = isDirect ? "none" : "flex";

            if (currentChatItem) {
                currentChatItem.classList.add("active");

                currentChatItem.style.fontWeight = "normal";
                const badge = currentChatItem.querySelector('.unread-badge');
                if (badge) {
                    badge.innerText = "0";
                    badge.style.display = "none";
                }
            }

            oldestMessageId = null;
            hasMoreMessages = true;
            document.getElementById("messagesList").innerHTML = "";

            document.getElementById("noChatSelected").style.display = "none";
            document.getElementById("activeChatArea").style.display = "flex";
            document.getElementById("currentChatTitle").innerText = chatName;

            await loadMoreMessages();
            await loadChatMembers(chatId);

            try {
                await connection.invoke("JoinChat", chatId);
            } catch (err) {
                console.error("SignalR JoinChat error:", err);
            }
        }

        async function loadMoreMessages() {
            if (isLoadingMessages || !hasMoreMessages) return;
            isLoadingMessages = true;

            const list = document.getElementById("messagesList");
            const previousScrollHeight = list.scrollHeight;

            let url = `/chats/${activeChatId}/messages?limit=20`;
            if (oldestMessageId) url += `&beforeMessageId=${oldestMessageId}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Ошибка загрузки истории");

                const messages = await response.json();
                console.log("Вот что пришло с бэкенда в первом элементе:", messages[0]);

                if (messages.length === 0) {
                    hasMoreMessages = false;
                    isLoadingMessages = false;
                    return;
                }

                oldestMessageId = messages[0].id;

                for (let i = messages.length - 1; i >= 0; i--) {
                    appendSingleMessage(messages[i], true);
                }

                if (connection && connection.state === signalR.HubConnectionState.Connected) {
                    connection.invoke("MarkChatAsRead", activeChatId).catch(err => console.error(err));
                }

                if (previousScrollHeight > 0) {
                    list.scrollTop = list.scrollHeight - previousScrollHeight;
                } else {
                    list.scrollTop = list.scrollHeight;
                }
            } catch (err) {
                console.error(err);
            } finally {
                isLoadingMessages = false;
            }
        }

        function handleScroll() {
            const list = document.getElementById("messagesList");

            if (list.scrollTop === 0) {
                loadMoreMessages();
            }
        }

        function appendSingleMessage(message, prepend = false) {
            const list = document.getElementById("messagesList");
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("msg");

            const formatter = new Intl.DateTimeFormat('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const username = message.senderUsername || (message.sender ? message.sender.username : null);
            const nameToShow = username || `Пользователь [${message.senderId.substring(0, 5)}]`;
            const nameSpan = isActiveChatDirect ? '' : `<span class="msg-sender">${nameToShow}</span>`;

            const isMyMessage = String(message.senderId).toLowerCase() === String(currentUserId).toLowerCase();

            if (isMyMessage) {
                const isRead = message.isRead || message.IsRead;
                const checkmarks = isRead ? '✓✓' : '✓';

                const statusHtml = `<span class="msg-status" style="margin-right: 5px; color: #e6f2ff; font-weight: bold;">${checkmarks}</span>`;

                msgDiv.classList.add("outgoing");
                msgDiv.innerHTML = `${message.text}<span class="msg-sentAt">${statusHtml}${formatter.format(Date.parse(message.sentAt))}</span>`;
            } else {
                msgDiv.classList.add("incoming");
                msgDiv.innerHTML = `${nameSpan}${message.text}<span class="msg-sentAt">${formatter.format(Date.parse(message.sentAt))}</span>`;
            }

            if (prepend) {
                list.insertBefore(msgDiv, list.firstChild);
            } else {
                list.appendChild(msgDiv);
            }
        }

        async function sendMessage() {
            const textInput = document.getElementById("messageTextInput");
            const text = textInput.value.trim();
            if (!text || !connection || !activeChatId) return;

            try {
                await connection.invoke("SendMessage", activeChatId, text);
                textInput.value = "";

                scrollToBottom(true);
            } catch (err) {
                console.error("Ошибка отправки:", err);
                alert("Ошибка при отправке: " + err.message);
            }
        }

        function openCreateChatModal() {
            document.getElementById("createChatModal").style.display = "flex";
            const input = document.getElementById("newChatNameInput");
            input.value = "";
            input.focus();
        }

        function closeCreateChatModal() {
            document.getElementById("createChatModal").style.display = "none";
        }

        async function submitCreateChat() {
            const input = document.getElementById("newChatNameInput");
            const chatName = input.value.trim();

            if (!chatName) {
                alert("Название чата не может быть пустым");
                return;
            }

            try {
                const response = await fetch('/chats', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: chatName })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Ошибка при создании чата");
                }

                const newChat = await response.json();

                closeCreateChatModal();

                await loadUserChats();

                selectChat(newChat.id, newChat.name);
            } catch (err) {
                console.error("Не удалось создать чат:", err);
                alert(err.message);
            }
        }

        async function openAddMemberModal() {
            if (!activeChatId) return;

            const modal = document.getElementById("addMemberModal");
            const container = document.getElementById("addMemberUsersList");
            container.innerHTML = "<div style='text-align:center; color:#888;'>Загрузка...</div>";
            modal.style.display = "flex";

            try {
                const response = await fetch('/users', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить список пользователей");
                const users = await response.json();

                container.innerHTML = "";

                if (users.length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#888;'>Нет доступных пользователей</div>";
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement("div");
                    row.style.cssText = "padding: 10px; background: #f7f9fa; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;";
                    row.onmouseover = () => row.style.background = "#e1e4e6";
                    row.onmouseout = () => row.style.background = "#f7f9fa";

                    row.innerHTML = `<span style="font-weight: 500;">${user.username}</span><button style="background:#2ec4b6; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px;">Пригласить</button>`;

                    const statusClass = user.isOnline ? "online" : "offline";
                    row.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="member-status ${statusClass}"></div>
                            <span style="font-weight: 500;">${user.username}</span>
                        </div>
                        <button style="background:#2ec4b6; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px;">Пригласить</button>
                    `;

                    row.onclick = () => submitAddMember(user.id);
                    container.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = "<div style='text-align:center; color:red;'>Ошибка загрузки</div>";
            }
        }

        function closeAddMemberModal() {
            document.getElementById("addMemberModal").style.display = "none";
        }

        async function submitAddMember(targetUserId) {
            try {
                const response = await fetch(`/chats/${activeChatId}/members`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userId: targetUserId })
                });

                if (!response.ok) {
                    const txt = await response.text();
                    throw new Error(txt || "Не удалось добавить участника");
                }

                closeAddMemberModal();

                await loadChatMembers(activeChatId);

            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        function openDirectChatModal() {
            const modal = document.getElementById("directChatModal");
            const container = document.getElementById("directChatUsersList");
            container.innerHTML = "<div style='text-align:center; color:#888;'>Загрузка пользователей...</div>";
            modal.style.display = "flex";

            fetch('/users', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${jwtToken}` }
            })
            .then(res => {
                if (!res.ok) throw new Error("Не удалось загрузить пользователей");
                return res.json();
            })
            .then(users => {
                container.innerHTML = "";
                if (users.length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#888;'>Нет доступных пользователей</div>";
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement("div");
                    row.style.cssText = "padding: 10px; background: #f7f9fa; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;";
                    row.onmouseover = () => row.style.background = "#e1e4e6";
                    row.onmouseout = () => row.style.background = "#f7f9fa";

                    row.innerHTML = `<span style="font-weight: 500;">${user.username}</span><button style="background:#007fff; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px;">Написать</button>`;

                    const statusClass = user.isOnline ? "online" : "offline";
                    row.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="member-status ${statusClass}"></div>
                            <span style="font-weight: 500;">${user.username}</span>
                        </div>
                        <button style="background:#007fff; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px;">Написать</button>
                    `;

                    row.onclick = () => submitStartDirectChat(user.id, user.username);
                    container.appendChild(row);
                });
            })
            .catch(err => {
                console.error(err);
                container.innerHTML = "<div style='text-align:center; color:red;'>Ошибка загрузки</div>";
            });
        }

        function closeDirectChatModal() {
            document.getElementById("directChatModal").style.display = "none";
        }

        async function submitStartDirectChat(targetUserId, targetUsername) {
            try {
                const response = await fetch('/chats/direct', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ targetUserId: targetUserId })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Не удалось открыть личный чат");
                }

                const chat = await response.json();

                closeDirectChatModal();

                await loadUserChats();

                selectChat(chat.id, targetUsername);
            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        function playSystemNotificationSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.warn("[Audio] Не удалось синтезировать звук уведомления:", e);
            }
        }

        function scrollToBottom(force = false) {
            const chatContainer = document.getElementById('messagesList');
            if (!chatContainer) return;

            const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight <= 50;

            if (force || isAtBottom) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function toggleAuthMode(isRegister) {
            document.getElementById("loginBox").style.display = isRegister ? "none" : "block";
            document.getElementById("registerBox").style.display = isRegister ? "block" : "none";

            if (isRegister) {
                document.getElementById("regUsernameInput").value = "";
                document.getElementById("regPasswordInput").value = "";
                document.getElementById("regPasswordConfirmInput").value = "";
            } else {
                document.getElementById("usernameInput").value = "";
                document.getElementById("passwordInput").value = "";
            }
        }

        async function registerAccount() {
            const username = document.getElementById("regUsernameInput").value.trim();
            const email = document.getElementById("regEmailInput").value.trim();
            const password = document.getElementById("regPasswordInput").value;
            const passwordConfirm = document.getElementById("regPasswordConfirmInput").value;

            if (!username || !password || !passwordConfirm || !email) {
                alert("Пожалуйста, заполните все поля формы регистрации");
                return;
            }

            if (password !== passwordConfirm) {
                alert("Введенные пароли не совпадают!");
                return;
            }

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, email: email, password: password })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMessage = "Не удалось зарегистрироваться.";

                    try {
                        const errorData = JSON.parse(errorText);
                        if (errorData.errors) {
                            errorMessage = Object.values(errorData.errors).flat().join("\n");
                        } else if (errorData.title) {
                            errorMessage = errorData.title;
                        }
                    } catch (e) {
                        if (errorText) errorMessage = errorText;
                    }

                    throw new Error(errorMessage);
                }

                alert("Регистрация прошла успешно! Теперь вы можете войти в свой аккаунт.");
                document.getElementById("usernameInput").value = username;

                toggleAuthMode(false);

                document.getElementById("passwordInput").focus();
            } catch (err) {
                console.error("Ошибка при регистрации:", err);
                alert("Ошибка: " + err.message);
            }
        }

        let lastTypingTime = 0;
        const TYPING_NOTIFY_INTERVAL = 1500;

        document.getElementById("messageTextInput").addEventListener("input", () => {
            if (!activeChatId || !connection || connection.state !== signalR.HubConnectionState.Connected) return;

            const now = Date.now();

            if (now - lastTypingTime > TYPING_NOTIFY_INTERVAL) {
                connection.invoke("NotifyTyping", activeChatId).catch(err => console.error("Ошибка NotifyTyping:", err));
                lastTypingTime = now;
            }
        });
    </script>
</body>
