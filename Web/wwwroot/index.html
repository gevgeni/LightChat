<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LightChat Minimal Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        /* Сохраняем кастомные динамические стили, которые твой JS завязывает на классы */
        .chat-item.active {
            background-color: #3b82f6 !important;
            color: white;
        }

        .member-status.online {
            background-color: #10b981;
        }

        .member-status.offline {
            background-color: #94a3b8;
        }

        /* Стили для сообщений, завязанные на логику appendSingleMessage */
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        @media (min-width: 768px) {
            .msg {
                max-width: 70%;
                font-size: 17px;
            }
        }

        .msg.incoming {
            background-color: #f1f5f9;
            align-self: flex-start;
            color: #1e293b;
            border-top-left-radius: 2px;
        }

        .msg.outgoing {
            background-color: #4f46e5;
            align-self: flex-end;
            color: white;
            border-top-right-radius: 2px;
        }

        .msg-sender {
            font-weight: 600;
            font-size: 11px;
            display: block;
            color: #64748b;
            margin-bottom: 2px;
        }

        .msg-sentAt {
            font-size: 10px;
            text-align: right;
            display: block;
            color: #94a3b8;
            margin-top: 4px;
            font-weight: 500;
        }

        .msg.outgoing .msg-sentAt {
            color: #c7d2fe;
        }

        /* Фикс для красивого отображения скроллбара */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen w-screen flex items-center justify-center overflow-hidden antialiased">

    <div class="app-container w-full h-full md:max-w-6xl md:h-[850px] bg-white md:rounded-2xl md:shadow-2xl flex overflow-hidden relative">

        <div id="authSection" class="w-full h-full flex flex-col items-center justify-center p-6 bg-gradient-to-tr from-slate-50 to-slate-100">

            <div class="auth-box w-full max-w-sm bg-white p-8 rounded-2xl shadow-xl border border-slate-100" id="loginBox">
                <h2 class="text-2xl font-bold text-center text-slate-900 mb-6">Войти в LightChat</h2>
                <div class="mb-4">
                    <input type="text" id="usernameInput" placeholder="Введите ваш Username" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base" />
                </div>
                <div class="mb-6">
                    <input type="password" id="passwordInput" placeholder="Введите ваш Пароль" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base" onkeypress="if(event.key === 'Enter') loginAndLoadApp()" />
                </div>
                <button class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition duration-200 shadow-lg shadow-indigo-600/20" onclick="loginAndLoadApp()">Войти</button>
                <div class="text-center mt-5">
                    <a href="#" onclick="toggleAuthMode(true); return false;" class="text-indigo-600 hover:text-indigo-700 text-sm font-semibold no-underline">Зарегистрироваться</a>
                </div>
            </div>

            <div class="auth-box w-full max-w-sm bg-white p-8 rounded-2xl shadow-xl border border-slate-100" id="registerBox" style="display: none;">
                <h2 class="text-2xl font-bold text-center text-slate-900 mb-6">Регистрация в LightChat</h2>
                <div class="mb-4">
                    <input type="text" id="regUsernameInput" placeholder="Придумайте Username" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" />
                </div>
                <div class="mb-4">
                    <input type="email" id="regEmailInput" placeholder="Введите ваш Email" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" />
                </div>
                <div class="mb-4">
                    <input type="password" id="regPasswordInput" placeholder="Придумайте Пароль" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" />
                </div>
                <div class="mb-6">
                    <input type="password" id="regPasswordConfirmInput" placeholder="Повторите Пароль" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" onkeypress="if(event.key === 'Enter') registerAccount()" />
                </div>
                <button class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition duration-200 shadow-lg shadow-emerald-500/20 mb-4" onclick="registerAccount()">Зарегистрироваться</button>
                <div class="text-center">
                    <a href="#" onclick="toggleAuthMode(false); return false;" class="text-emerald-500 hover:text-emerald-600 text-sm font-semibold no-underline">Уже есть аккаунт? Войти</a>
                </div>
            </div>

        </div>

        <div id="mainInterface" class="w-full h-full" style="display: none;">
            <div class="flex w-full h-full relative">

                <div id="mobileSidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-20 md:hidden transition-opacity duration-300"></div>

                <div id="chatsSidebar" class="sidebar fixed inset-y-0 left-[-100%] md:static md:left-0 w-[280px] bg-slate-800 text-slate-200 flex flex-col border-r border-slate-700 z-30 transition-all duration-300 h-full shrink-0">

                    <div class="sidebar-header flex justify-between items-center px-4 py-4 bg-slate-900 border-b border-slate-700 text-base font-bold">
                        <span class="tracking-wide text-slate-100">Мои чаты</span>
                        <div class="flex gap-2">
                            <button onclick="openDirectChatModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-full w-8 h-8 text-sm flex items-center justify-center font-bold transition active:scale-95 shadow" title="Написать лично">💬</button>
                            <button onclick="openCreateChatModal()" class="bg-emerald-500 hover:bg-emerald-400 text-white rounded-full w-8 h-8 text-lg flex items-center justify-center font-bold transition active:scale-95 shadow" title="Создать группу">+</button>
                        </div>
                    </div>

                    <div class="chats-list flex-1 overflow-y-auto custom-scrollbar dark-scrollbar divide-y divide-slate-700/50" id="chatsListContainer">
                    </div>

                    <div class="p-4 bg-slate-900 border-t border-slate-700">
                        <button onclick="logout()" class="bg-rose-600 hover:bg-rose-500 text-white w-full py-2.5 rounded-xl font-medium transition text-sm shadow">Выйти из аккаунта</button>
                    </div>
                </div>

                <div class="chat-window flex-1 flex flex-col bg-slate-50 h-full min-w-0">

                    <div id="noChatSelected" class="flex-1 flex flex-col items-center justify-center text-slate-400 font-medium px-4 text-center text-base gap-3">
                        <button onclick="toggleMobileSidebar(true)" class="md:hidden p-3 bg-slate-800 text-white rounded-xl shadow mb-2 font-semibold text-sm">☰ Открыть список чатов</button>
                        <span>Выберите чат слева, чтобы начать общение</span>
                    </div>

                    <div id="activeChatArea" class="flex-col flex-1 h-full hidden overflow-hidden">

                        <div class="chat-header px-4 py-3.5 bg-white border-b border-slate-200 flex items-center shadow-sm shrink-0">
                            <button onclick="toggleMobileSidebar(true)" class="mr-3 text-slate-600 hover:text-slate-900 focus:outline-none md:hidden p-1">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                                </svg>
                            </button>
                            <div class="font-bold text-slate-800 text-base md:text-lg truncate flex-1" id="currentChatTitle">Название чата</div>
                        </div>

                        <div class="flex flex-1 overflow-hidden relative">

                            <div class="flex flex-col flex-1 h-full min-w-0 bg-slate-50">

                                <div class="messages-list flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-3" id="messagesList"></div>

                                <div id="typingIndicator" class="hidden px-6 pb-2 text-xs text-slate-400 font-medium italic bg-slate-50"></div>

                                <div class="input-area p-3 md:p-4 bg-white border-t border-slate-200 flex gap-2 shrink-0 items-center">
                                    <input type="text" id="messageTextInput" placeholder="Напишите сообщение..." class="flex-1 p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base md:text-sm bg-slate-50" onkeypress="if(event.key === 'Enter') sendMessage()" />
                                    <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 md:py-2.5 font-bold rounded-xl transition shadow shadow-indigo-600/10 active:scale-95 text-base md:text-sm shrink-0">Отправить</button>
                                </div>
                            </div>

                            <div class="members-sidebar w-[230px] bg-white border-left border-slate-200 hidden lg:flex flex-col h-full shrink-0">
                                <div class="members-header flex justify-between items-center p-4 bg-slate-50 border-b border-slate-200 font-bold text-sm text-slate-700">
                                    <span>В чате (<span id="membersCount">0</span>)</span>
                                    <button onclick="openAddMemberModal()" class="bg-emerald-500 hover:bg-emerald-400 text-white rounded-full w-6 h-6 text-sm flex items-center justify-center font-bold transition active:scale-95 shadow">+</button>
                                </div>
                                <div class="members-list flex-1 overflow-y-auto p-2 custom-scrollbar space-y-0.5" id="chatMembersContainer"></div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="createChatModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white p-5 rounded-2xl w-full max-w-sm flex flex-col gap-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-900">Новый групповой чат</h3>
                <button onclick="closeCreateChatModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-semibold">&times;</button>
            </div>
            <input type="text" id="newChatNameInput" placeholder="Введите название чата..." class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" />
            <button onclick="submitCreateChat()" class="bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold transition shadow shadow-emerald-500/20">Создать</button>
        </div>
    </div>

    <div id="addMemberModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white p-5 rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col gap-4 shadow-2xl">
            <div class="flex justify-between items-center shrink-0">
                <h3 class="text-lg font-bold text-slate-900">Добавить участника</h3>
                <button onclick="closeAddMemberModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-semibold">&times;</button>
            </div>
            <div id="addMemberUsersList" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2 max-h-[50vh] pr-1"></div>
        </div>
    </div>

    <div id="directChatModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white p-5 rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col gap-4 shadow-2xl">
            <div class="flex justify-between items-center shrink-0">
                <h3 class="text-lg font-bold text-slate-900">Начать личный чат</h3>
                <button onclick="closeDirectChatModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-semibold">&times;</button>
            </div>
            <div id="directChatUsersList" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2 max-h-[50vh] pr-1"></div>
        </div>
    </div>

    <script>
        // ВСЕ ТВОИ ОРИГИНАЛЬНЫЕ ПЕРЕМЕННЫЕ СОХРАНЕНЫ
        let connection = null;
        let jwtToken = "";
        let currentUserId = null;
        let activeChatId = null;

        let oldestMessageId = null;
        let isLoadingMessages = false;
        let hasMoreMessages = true;

        let isActiveChatDirect = false;

        // Вспомогательные функции управления мобильным сайдбаром чатов
        function toggleMobileSidebar(open) {
            const sidebar = document.getElementById("chatsSidebar");
            const overlay = document.getElementById("mobileSidebarOverlay");
            if (open) {
                sidebar.classList.remove("left-[-100%]");
                sidebar.classList.add("left-0");
                overlay.classList.remove("hidden");
            } else {
                sidebar.classList.remove("left-0");
                sidebar.classList.add("left-[-100%]");
                overlay.classList.add("hidden");
            }
        }

        document.getElementById("mobileSidebarOverlay").addEventListener("click", () => toggleMobileSidebar(false));

        // Переопределяем оригинальную функцию selectChat, чтобы при выборе чата меню автоматически закрывалось на мобилках
        const originalSelectChat = selectChat;
        selectChat = async function (chatId, chatName) {
            await originalSelectChat(chatId, chatName);
            toggleMobileSidebar(false); // Закрываем сайдбар на мобилках после клика по чату
        };

        // ТВОЙ ОРИГИНАЛЬНЫЙ СУЩЕСТВУЮЩИЙ JS-КОД (БЕЗ ИЗМЕНЕНИЙ)
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        window.onload = async function () {
            const savedToken = localStorage.getItem("lightchat_token");
            if (savedToken) {
                const parsed = parseJwt(savedToken);
                if (parsed && parsed.exp) {
                    const currentTime = Math.floor(Date.now() / 1000);
                    if (parsed.exp > currentTime) {
                        jwtToken = savedToken;
                        currentUserId = parsed["sub"];
                        await initializeApp();
                        return;
                    }
                }
                localStorage.removeItem("lightchat_token");
            }
        }

        async function loginAndLoadApp() {
            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value;

            if (!username || !password) {
                alert("Введите имя пользователя и пароль");
                return;
            }

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (!response.ok) throw new Error("Неверное имя пользователя или пароль");

                const data = await response.json();
                jwtToken = data.tokenString;

                localStorage.setItem("lightchat_token", jwtToken)

                const payload = parseJwt(jwtToken);
                currentUserId = payload.sub;
                currentUsername = payload.unique_name;

                console.log("JWT получен успешно!");
                await initializeApp();
            } catch (err) {
                console.error("Ошибка:", err);
                alert("Ошибка: " + err.message);
            }
        }

        async function initializeApp() {
            try {
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("/chatHub", { accessTokenFactory: () => jwtToken })
                    .withAutomaticReconnect()
                    .build();

                connection.on("ReceiveMessage", (message) => {
                    if (message.chatId === activeChatId) {
                        appendSingleMessage(message, false);
                        scrollToBottom(false);

                        const isNotMyMessage = String(message.senderId).toLowerCase() !== String(currentUserId).toLowerCase();

                        if (isNotMyMessage) {
                            connection.invoke("MarkChatAsRead", message.chatId)
                                .catch(err => console.error("Ошибка авто-прочтения входящего сообщения:", err));
                        }
                    } else {
                        console.log(`Пришло сообщение в фоновый чат: ${message.chatId}`);

                        try {
                            playSystemNotificationSound();
                        } catch (soundError) {
                            console.error("[Audio Error] Ошибка внутри вызова звука:", soundError);
                        }

                        const chatItem = document.getElementById(`chat-item-${message.chatId}`);
                        if (chatItem) {
                            chatItem.style.fontWeight = "bold";

                            const badge = chatItem.querySelector('.unread-badge');
                            if (badge) {
                                let currentCount = parseInt(badge.innerText) || 0;
                                currentCount++;
                                badge.innerText = currentCount;
                                badge.style.display = 'inline-block';
                            }
                        }
                    }
                });

                connection.on("UserStatusChanged", (data) => {
                    console.log(`Статус пользователя ${data.userId} изменился: ${data.isOnline}`);

                    const memberRow = document.querySelector(`#chatMembersContainer [data-member-id="${data.userId}"]`);
                    if (memberRow) {
                        const statusIndicator = memberRow.querySelector('.member-status');
                        if (statusIndicator) {
                            if (data.isOnline) {
                                statusIndicator.classList.remove('offline');
                                statusIndicator.classList.add('online');
                            } else {
                                statusIndicator.classList.remove('online');
                                statusIndicator.classList.add('offline');
                            }
                        }
                    }
                });

                let hideTypingIndicatorTimer;
                connection.on("UserIsTyping", (data) => {
                    if (data.chatId !== activeChatId) return;

                    const indicator = document.getElementById("typingIndicator");

                    const memberElement = document.querySelector(`#chatMembersContainer [data-member-id="${data.userId}"] span`);
                    const username = memberElement ? memberElement.innerHTML.replace(" (Вы)", "") : "Собеседник";

                    indicator.innerText = `${username} печатает...`;
                    indicator.style.display = "block";

                    clearTimeout(hideTypingIndicatorTimer);
                    hideTypingIndicatorTimer = setTimeout(() => {
                        indicator.style.display = "none";
                    }, 2000);
                });

                connection.on("MessagesMarkedAsRead", (data) => {
                    const isCurrentChat = String(data.chatId) === String(activeChatId);
                    const isReaderMe = String(data.readerId).toLowerCase() === String(currentUserId).toLowerCase();

                    if (isCurrentChat && !isReaderMe) {
                        const myMessagesStatuses = document.querySelectorAll('#messagesList .outgoing .msg-status');
                        myMessagesStatuses.forEach(statusEl => {
                            if (statusEl.innerText.trim() === '✓') {
                                statusEl.innerText = '✓✓';
                            }
                        });
                    }

                    if (isReaderMe) {
                        const chatItem = document.getElementById(`chat-item-${data.chatId}`);
                        if (chatItem) {
                            chatItem.style.fontWeight = "normal";
                            const badge = chatItem.querySelector('.unread-badge');
                            if (badge) {
                                badge.innerText = "0";
                                badge.style.display = "none";
                            }
                        }
                    }

                    if (!isCurrentChat || isReaderMe) return;

                    const myMessagesStatuses = document.querySelectorAll('#messagesList .outgoing .msg-status');
                    myMessagesStatuses.forEach(statusEl => {
                        if (statusEl.innerText === '✓') {
                            statusEl.innerText = '✓✓';
                        }
                    });
                });

                connection.on("ChatInvitation", async (chat) => {
                    console.log("Вас пригласили в новый чат! Обновляем список...", chat);

                    await loadUserChats();
                });

                await connection.start();

                document.getElementById("authSection").style.display = "none";
                document.getElementById("mainInterface").style.display = "block";
                console.log("Успешное защищенное подключение к SignalR");

                await loadUserChats();
                document.getElementById("messagesList").addEventListener("scroll", handleScroll);
            } catch (err) {
                console.error("Ошибка:", err);
                alert("Ошибка: " + err.message);
            }
        }

        function logout() {
            localStorage.removeItem("lightchat_token");
            jwtToken = "";
            currentUserId = null;
            currentUsername = null;
            activeChatId = null;

            if (connection) { connection.stop(); }

            document.getElementById("mainInterface").style.display = "none";
            document.getElementById("authSection").style.display = "flex";
        }

        async function loadChatMembers(chatId) {
            try {
                const response = await fetch(`/chats/${chatId}/members`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить участников");

                const members = await response.json();
                const container = document.getElementById("chatMembersContainer");
                const countSpan = document.getElementById("membersCount");

                container.innerHTML = "";
                countSpan.innerText = members.length;

                members.forEach(member => {
                    const item = document.createElement("div");
                    // Заменены инлайн-стили старой верстки на Tailwind-классы для элементов сайдбара
                    item.className = "member-item flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-50 transition cursor-pointer text-sm font-medium text-slate-700";
                    item.setAttribute("data-member-id", member.id);

                    const isMe = member.id === currentUserId ? " (Вы)" : "";
                    const statusClass = (member.id === currentUserId || member.isOnline) ? "online" : "offline";

                    item.innerHTML = `<div class="member-status w-2.5 h-2.5 rounded-full ${statusClass}"></div><span class="truncate">${member.username}${isMe}</span>`;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("Ошибка загрузки участников:", err);
            }
        }

        async function loadUserChats() {
            try {
                const response = await fetch('/chats', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить список чатов");

                const chats = await response.json();
                const container = document.getElementById("chatsListContainer");
                container.innerHTML = "";

                chats.forEach(chat => {
                    const item = document.createElement("div");
                    item.className = "chat-item px-4 py-3.5 flex justify-between items-center cursor-pointer hover:bg-slate-700/60 transition duration-150 text-sm font-medium border-b border-slate-700/30";
                    item.id = `chat-item-${chat.id}`;
                    item.dataset.isDirect = chat.isDirect;
                    item.onclick = () => selectChat(chat.id, chat.name);

                    const unreadCount = chat.unreadCount || 0;
                    const badgeDisplay = unreadCount > 0 ? 'inline-block' : 'none';

                    item.innerHTML = `
                            <span class="chat-item-name truncate flex-1 pr-2">${chat.name}</span>
                            <span class="unread-badge bg-emerald-500 text-white rounded-full px-2 py-0.5 text-xs font-bold min-w-[20px] text-center shrink-0 shadow-sm shadow-emerald-500/20" style="display: ${badgeDisplay};">${unreadCount}</span>
                        `;

                    container.appendChild(item);

                    if (connection && connection.state === signalR.HubConnectionState.Connected) {
                        connection.invoke("JoinChat", chat.id).catch(err =>
                            console.error(`Ошибка фонового подключения к чату ${chat.id}:`, err)
                        );
                    }
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function selectChat(chatId, chatName) {
            if (activeChatId === chatId) return;

            if (activeChatId) {
                document.getElementById(`chat-item-${activeChatId}`)?.classList.remove("active");
            }
            activeChatId = chatId;

            const currentChatItem = document.getElementById(`chat-item-${activeChatId}`);
            const isDirect = currentChatItem ? currentChatItem.dataset.isDirect === 'true' : false;
            isActiveChatDirect = isDirect;

            const addMemberBtn = document.querySelector(".members-header button");
            if (addMemberBtn) addMemberBtn.style.display = isDirect ? "none" : "flex";

            if (currentChatItem) {
                currentChatItem.classList.add("active");

                currentChatItem.style.fontWeight = "normal";
                const badge = currentChatItem.querySelector('.unread-badge');
                if (badge) {
                    badge.innerText = "0";
                    badge.style.display = "none";
                }
            }

            oldestMessageId = null;
            hasMoreMessages = true;
            document.getElementById("messagesList").innerHTML = "";

            document.getElementById("noChatSelected").style.display = "none";
            document.getElementById("activeChatArea").style.className = "";
            document.getElementById("activeChatArea").style.display = "flex";
            document.getElementById("currentChatTitle").innerText = chatName;

            await loadMoreMessages();
            await loadChatMembers(chatId);

            try {
                await connection.invoke("JoinChat", chatId);
            } catch (err) {
                console.error("SignalR JoinChat error:", err);
            }
        }

        async function loadMoreMessages() {
            if (isLoadingMessages || !hasMoreMessages) return;
            isLoadingMessages = true;

            const list = document.getElementById("messagesList");
            const previousScrollHeight = list.scrollHeight;

            let url = `/chats/${activeChatId}/messages?limit=20`;
            if (oldestMessageId) url += `&beforeMessageId=${oldestMessageId}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Ошибка загрузки истории");

                const messages = await response.json();
                console.log("Вот что пришло с бэкенда в первом элементе:", messages[0]);

                if (messages.length === 0) {
                    hasMoreMessages = false;
                    isLoadingMessages = false;
                    return;
                }

                oldestMessageId = messages[0].id;

                for (let i = messages.length - 1; i >= 0; i--) {
                    appendSingleMessage(messages[i], true);
                }

                if (connection && connection.state === signalR.HubConnectionState.Connected) {
                    connection.invoke("MarkChatAsRead", activeChatId).catch(err => console.error(err));
                }

                if (previousScrollHeight > 0) {
                    list.scrollTop = list.scrollHeight - previousScrollHeight;
                } else {
                    list.scrollTop = list.scrollHeight;
                }
            } catch (err) {
                console.error(err);
            } finally {
                isLoadingMessages = false;
            }
        }

        function handleScroll() {
            const list = document.getElementById("messagesList");

            if (list.scrollTop === 0) {
                loadMoreMessages();
            }
        }

        function appendSingleMessage(message, prepend = false) {
            const list = document.getElementById("messagesList");
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("msg");

            const formatter = new Intl.DateTimeFormat('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const username = message.senderUsername || (message.sender ? message.sender.username : null);
            const nameToShow = username || `Пользователь [${message.senderId.substring(0, 5)}]`;
            const nameSpan = isActiveChatDirect ? '' : `<span class="msg-sender">${nameToShow}</span>`;

            const isMyMessage = String(message.senderId).toLowerCase() === String(currentUserId).toLowerCase();

            if (isMyMessage) {
                const isRead = message.isRead || message.IsRead;
                const checkmarks = isRead ? '✓✓' : '✓';

                const statusHtml = `<span class="msg-status" style="margin-right: 5px; color: #c7d2fe; font-weight: bold;">${checkmarks}</span>`;

                msgDiv.classList.add("outgoing");
                msgDiv.innerHTML = `${message.text}<span class="msg-sentAt">${statusHtml}${formatter.format(Date.parse(message.sentAt))}</span>`;
            } else {
                msgDiv.classList.add("incoming");
                msgDiv.innerHTML = `${nameSpan}${message.text}<span class="msg-sentAt">${formatter.format(Date.parse(message.sentAt))}</span>`;
            }

            if (prepend) {
                list.insertBefore(msgDiv, list.firstChild);
            } else {
                list.appendChild(msgDiv);
            }
        }

        async function sendMessage() {
            const textInput = document.getElementById("messageTextInput");
            const text = textInput.value.trim();
            if (!text || !connection || !activeChatId) return;

            try {
                await connection.invoke("SendMessage", activeChatId, text);
                textInput.value = "";

                scrollToBottom(true);
            } catch (err) {
                console.error("Ошибка отправки:", err);
                alert("Ошибка при отправке: " + err.message);
            }
        }

        function openCreateChatModal() {
            document.getElementById("createChatModal").style.display = "flex";
            const input = document.getElementById("newChatNameInput");
            input.value = "";
            input.focus();
        }

        function closeCreateChatModal() {
            document.getElementById("createChatModal").style.display = "none";
        }

        async function submitCreateChat() {
            const input = document.getElementById("newChatNameInput");
            const chatName = input.value.trim();

            if (!chatName) {
                alert("Название чата не может быть пустым");
                return;
            }

            try {
                const response = await fetch('/chats', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: chatName })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Ошибка при создании чата");
                }

                const newChat = await response.json();

                closeCreateChatModal();

                await loadUserChats();

                selectChat(newChat.id, newChat.name);
            } catch (err) {
                console.error("Не удалось создать чат:", err);
                alert(err.message);
            }
        }

        async function openAddMemberModal() {
            if (!activeChatId) return;

            const modal = document.getElementById("addMemberModal");
            const container = document.getElementById("addMemberUsersList");
            container.innerHTML = "<div class='text-center text-slate-400 py-4 font-medium'>Загрузка...</div>";
            modal.style.display = "flex";

            try {
                const response = await fetch('/users', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (!response.ok) throw new Error("Не удалось загрузить список пользователей");
                const users = await response.json();

                container.innerHTML = "";

                if (users.length === 0) {
                    container.innerHTML = "<div class='text-center text-slate-400 py-4 font-medium'>Нет доступных пользователей</div>";
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement("div");
                    row.className = "p-3 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer flex justify-between items-center hover:bg-slate-100 transition";

                    const statusClass = user.isOnline ? "online" : "offline";
                    row.innerHTML = `
                            <div class="flex items-center gap-2.5 min-w-0">
                                <div class="member-status w-2 h-2 rounded-full ${statusClass} shrink-0"></div>
                                <span class="font-semibold text-sm text-slate-700 truncate">${user.username}</span>
                            </div>
                            <button class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-1.5 px-3 rounded-lg text-xs transition shrink-0 shadow shadow-emerald-500/10">Пригласить</button>
                        `;

                    row.onclick = () => submitAddMember(user.id);
                    container.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = "<div class='text-center text-rose-500 py-4 font-medium'>Ошибка загрузки</div>";
            }
        }

        function closeAddMemberModal() {
            document.getElementById("addMemberModal").style.display = "none";
        }

        async function submitAddMember(targetUserId) {
            try {
                const response = await fetch(`/chats/${activeChatId}/members`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userId: targetUserId })
                });

                if (!response.ok) {
                    const txt = await response.text();
                    throw new Error(txt || "Не удалось добавить участника");
                }

                closeAddMemberModal();

                await loadChatMembers(activeChatId);

            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        function openDirectChatModal() {
            const modal = document.getElementById("directChatModal");
            const container = document.getElementById("directChatUsersList");
            container.innerHTML = "<div class='text-center text-slate-400 py-4 font-medium'>Загрузка пользователей...</div>";
            modal.style.display = "flex";

            fetch('/users', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${jwtToken}` }
            })
                .then(res => {
                    if (!res.ok) throw new Error("Не удалось загрузить пользователей");
                    return res.json();
                })
                .then(users => {
                    container.innerHTML = "";
                    if (users.length === 0) {
                        container.innerHTML = "<div class='text-center text-slate-400 py-4 font-medium'>Нет доступных пользователей</div>";
                        return;
                    }

                    users.forEach(user => {
                        const row = document.createElement("div");
                        row.className = "p-3 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer flex justify-between items-center hover:bg-slate-100 transition";

                        const statusClass = user.isOnline ? "online" : "offline";
                        row.innerHTML = `
                            <div class="flex items-center gap-2.5 min-w-0">
                                <div class="member-status w-2 h-2 rounded-full ${statusClass} shrink-0"></div>
                                <span class="font-semibold text-sm text-slate-700 truncate">${user.username}</span>
                            </div>
                            <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 px-3 rounded-lg text-xs transition shrink-0 shadow shadow-indigo-600/10">Написать</button>
                        `;

                        row.onclick = () => submitStartDirectChat(user.id, user.username);
                        container.appendChild(row);
                    });
                })
                .catch(err => {
                    console.error(err);
                    container.innerHTML = "<div class='text-center text-rose-500 py-4 font-medium'>Ошибка загрузки</div>";
                });
        }

        function closeDirectChatModal() {
            document.getElementById("directChatModal").style.display = "none";
        }

        async function submitStartDirectChat(targetUserId, targetUsername) {
            try {
                const response = await fetch('/chats/direct', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ targetUserId: targetUserId })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Не удалось открыть личный чат");
                }

                const chat = await response.json();

                closeDirectChatModal();

                await loadUserChats();

                selectChat(chat.id, targetUsername);
            } catch (err) {
                console.error(err);
                alert(err.message);
            }
        }

        function playSystemNotificationSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.warn("[Audio] Не удалось синтезировать звук уведомления:", e);
            }
        }

        function scrollToBottom(force = false) {
            const chatContainer = document.getElementById('messagesList');
            if (!chatContainer) return;

            const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight <= 50;

            if (force || isAtBottom) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function toggleAuthMode(isRegister) {
            document.getElementById("loginBox").style.display = isRegister ? "none" : "block";
            document.getElementById("registerBox").style.display = isRegister ? "block" : "none";

            if (isRegister) {
                document.getElementById("regUsernameInput").value = "";
                document.getElementById("regPasswordInput").value = "";
                document.getElementById("regPasswordConfirmInput").value = "";
            } else {
                document.getElementById("usernameInput").value = "";
                document.getElementById("passwordInput").value = "";
            }
        }

        async function registerAccount() {
            const username = document.getElementById("regUsernameInput").value.trim();
            const email = document.getElementById("regEmailInput").value.trim();
            const password = document.getElementById("regPasswordInput").value;
            const passwordConfirm = document.getElementById("regPasswordConfirmInput").value;

            if (!username || !password || !passwordConfirm || !email) {
                alert("Пожалуйста, заполните все поля формы регистрации");
                return;
            }

            if (password !== passwordConfirm) {
                alert("Введенные пароли не совпадают!");
                return;
            }

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, email: email, password: password })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMessage = "Не удалось зарегистрироваться.";

                    try {
                        const errorData = JSON.parse(errorText);
                        if (errorData.errors) {
                            errorMessage = Object.values(errorData.errors).flat().join("\n");
                        } else if (errorData.title) {
                            errorMessage = errorData.title;
                        }
                    } catch (e) {
                        if (errorText) errorMessage = errorText;
                    }

                    throw new Error(errorMessage);
                }

                alert("Регистрация прошла успешно! Теперь вы можете войти в свой аккаунт.");
                document.getElementById("usernameInput").value = username;

                toggleAuthMode(false);

                document.getElementById("passwordInput").focus();
            } catch (err) {
                console.error("Ошибка при регистрации:", err);
                alert("Ошибка: " + err.message);
            }
        }

        let lastTypingTime = 0;
        const TYPING_NOTIFY_INTERVAL = 1500;

        document.getElementById("messageTextInput").addEventListener("input", () => {
            if (!activeChatId || !connection || connection.state !== signalR.HubConnectionState.Connected) return;

            const now = Date.now();

            if (now - lastTypingTime > TYPING_NOTIFY_INTERVAL) {
                connection.invoke("NotifyTyping", activeChatId).catch(err => console.error("Ошибка NotifyTyping:", err));
                lastTypingTime = now;
            }
        });
    </script>
</body>
</html>
